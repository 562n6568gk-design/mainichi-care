<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>まいにちケア記録</title>
  <meta name="theme-color" content="#79b88a" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon.svg" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">マウスピース記録</p>
        <h1>まいにちケア記録</h1>
      </div>
      <div class="status-pill" id="statusPill">確認中</div>
    </header>

    <main>
      <section class="card main-card">
        <div class="today-row">
          <div>
            <p class="label">今日の装着時間</p>
            <div class="big-time" id="wearTime">00:00</div>
          </div>
          <div class="goal-circle">
            <span id="progressPercent">0%</span>
            <small>達成率</small>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-bar"><div id="progressFill"></div></div>
          <p id="remainingText">目標まであと 22時間00分</p>
        </div>

        <div class="action-grid">
          <button class="primary" id="wearBtn">装着した</button>
          <button class="danger" id="removeBtn">外した</button>
        </div>
      </section>

      <section class="card">
        <h2>今のステージ</h2>
        <div class="stage-grid">
          <label>ステージ<input id="stageInput" type="text" placeholder="A1 / B1 / A2" /></label>
          <label>交換日<input id="nextDateInput" type="date" /></label>
        </div>
        <button class="secondary" id="saveStageBtn">ステージを保存</button>
        <p class="hint" id="nextDateText">交換日を設定するとここに表示されます。</p>
      </section>

      <section class="card">
        <h2>今日のメモ</h2>
        <div class="tag-row">
          <button class="tag" data-memo="痛みあり">痛みあり</button>
          <button class="tag" data-memo="違和感あり">違和感あり</button>
          <button class="tag" data-memo="ゴム掛け忘れ">ゴム掛け忘れ</button>
          <button class="tag" data-memo="アタッチメント確認">アタッチメント確認</button>
        </div>
        <textarea id="memoInput" placeholder="例：右上が痛い、外食で長めに外した、アタッチメント外れたかも"></textarea>
        <button class="secondary" id="saveMemoBtn">メモを保存</button>
      </section>

      <section class="card">
        <h2>今日の履歴</h2>
        <div id="logList" class="log-list"></div>
      </section>

      <section class="card">
        <h2>設定</h2>
        <label>1日の目標装着時間
          <select id="goalSelect">
            <option value="20">20時間</option>
            <option value="21">21時間</option>
            <option value="22" selected>22時間</option>
            <option value="23">23時間</option>
          </select>
        </label>
        <button class="ghost" id="resetTodayBtn">今日の記録をリセット</button>
      </section>
    </main>
  </div>
  <script src="./script.js"></script>
</body>
</html>
