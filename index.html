<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>まいにちケア記録</title><meta name="theme-color" content="#79b88a"><link rel="manifest" href="./manifest.json"><link rel="icon" href="./icon.svg"><link rel="stylesheet" href="./style.css"></head><body><div class="app"><header class="hero"><div><p class="eyebrow">マウスピース記録</p><h1>まいにちケア記録</h1><p class="date-line" id="dateLine"></p></div><div class="status-pill" id="statusPill">確認中</div></header><main><section class="card main-card"><div class="today-row"><div><p class="label">今日の装着時間</p><div class="big-time" id="wearTime">00:00</div><p class="current-line" id="currentLine"></p></div><div class="goal-circle"><span id="progressPercent">0%</span><small>達成率</small></div></div><div class="progress-wrap"><div class="progress-bar"><div id="progressFill"></div></div><p id="remainingText"></p></div><div class="action-grid"><button class="primary" id="wearBtn">装着した</button><button class="danger" id="removeBtn">外した</button></div></section><section class="card"><h2>今のステージ</h2><div class="stage-grid"><label>ステージ<input id="stageInput" type="text" placeholder="A1 / B1 / A2"></label><label>交換日<input id="nextDateInput" type="date"></label></div><button class="secondary" id="saveStageBtn">ステージを保存</button><p class="hint" id="nextDateText"></p></section><section class="card"><h2>今日のメモ</h2><p class="hint">入力すると自動保存されます。</p><div class="tag-row"><button class="tag" data-memo="痛みあり">痛みあり</button><button class="tag" data-memo="違和感あり">違和感あり</button><button class="tag" data-memo="ゴム掛け忘れ">ゴム掛け忘れ</button><button class="tag" data-memo="アタッチメント確認">アタッチメント確認</button></div><textarea id="memoInput" placeholder="例：右上が痛い、外食で長めに外した、アタッチメント外れたかも"></textarea><p class="saved-line" id="memoSavedLine">自動保存待ち</p></section><section class="card"><div class="calendar-head"><button class="mini" id="prevMonthBtn">‹</button><div><h2 id="calendarTitle">カレンダー</h2><p class="hint" id="monthSummary"></p></div><button class="mini" id="nextMonthBtn">›</button></div><div class="week-row"><span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span></div><div class="calendar-grid" id="calendarGrid"></div></section><section class="card detail-card" id="dayDetail"><h2 id="detailTitle">日付を選択</h2><p class="detail-time" id="detailWearTime">--:--</p><p class="hint" id="detailInfo">カレンダーの日付を押すと詳細が出ます。</p><div id="detailMemo" class="memo-box"></div><div id="detailLogs" class="log-list"></div></section><section class="card"><h2>今日の履歴</h2><p class="hint" id="historyDateLine"></p><div id="logList" class="log-list"></div></section><section class="card"><h2>設定</h2><label>1日の目標装着時間<select id="goalSelect"><option value="20">20時間</option><option value="21">21時間</option><option value="22" selected>22時間</option><option value="23">23時間</option></select></label><button class="ghost" id="resetTodayBtn">今日の記録をリセット</button></section></main></div><script src="./script.js"></script></body></html>
